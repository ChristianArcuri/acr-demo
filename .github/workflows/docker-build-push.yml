name: Build and Push Docker Image to ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/acr-demo-app:${{ github.run_number }} .
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/acr-demo-app:${{ github.run_number }} ${{ secrets.ACR_LOGIN_SERVER }}/acr-demo-app:latest

      - name: Push image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/acr-demo-app:${{ github.run_number }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/acr-demo-app:latest